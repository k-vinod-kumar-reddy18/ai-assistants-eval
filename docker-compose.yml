version: "3.9"

services:
  oss-backend:
    build:
      context: ./backend/oss
    ports:
      - "8001:8001"
    environment:
      - OSS_PROVIDER=${OSS_PROVIDER:-ollama}
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=qwen2.5:7b
      - HF_TOKEN=${HF_TOKEN:-}
    command: uvicorn app:app --host 0.0.0.0 --port 8001 --reload
    depends_on:
      - ollama

  frontier-backend:
    build:
      context: ./backend/frontier
    ports:
      - "8002:8002"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    command: uvicorn app:app --host 0.0.0.0 --port 8002 --reload

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_OSS_API=http://localhost:8001
      - VITE_FRONTIER_API=http://localhost:8002
    depends_on:
      - oss-backend
      - frontier-backend

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Pull model on startup
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 5 && ollama pull qwen2.5:7b && wait"]

volumes:
  ollama_data:
